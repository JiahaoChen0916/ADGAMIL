exp_arguments:
  n_classes: 6
  save_exp_code: PANDA_CHIEF_100
  raw_save_dir: D:/ADGA-main/heatmaps/heatmap_raw_results_PANDA_CHIEF_128
  production_save_dir: D:/ADGA-main/heatmaps/heatmap_production_results_PANDA_CHIEF_128
  batch_size: 256

data_arguments:
  data_dir:
    grade_0: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_0
    grade_1: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_1
    grade_2: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_2
    grade_3: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_3
    grade_4: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_4
    grade_5: D:/ADGA_Datasets/heatmap_slides/PANDA/grade_5
  data_dir_key: label
  process_list: D:/ADGA-main/dataset_csv/panda_heatmap.csv
  preset: null
  slide_ext: .tiff
  label_dict:
    grade_0: 0
    grade_1: 1
    grade_2: 2
    grade_3: 3
    grade_4: 4
    grade_5: 5

patching_arguments:
  patch_size: 128
  overlap: 0.875
  patch_level: 0
  custom_downsample: 1

encoder_arguments:
  model_name: chief
  target_img_size: 224

model_arguments:
  ckpt_path: D:/ADGA-main/results/PANDA_CHIEF_100_s1/s_0_best_checkpoint.pt
  model_type: clam_sb
  initiate_fn: initiate_model
  model_size: small
  drop_out: 0.25
  embed_dim: 768

heatmap_arguments:
  vis_level: 2
  alpha: 0.65
  blank_canvas: false
  save_orig: true
  save_ext: jpg
  use_ref_scores: false
  blur: true
  use_center_shift: true
  use_roi: false
  calc_heatmap: true
  binarize: false
  binary_thresh: -1
  custom_downsample: 1
  cmap: jet
  convert_to_percentiles: true
  enable_fine_heatmap: true

sample_arguments:
  samples:
    - name: topk_high_attention_panda_chief
      sample: true
      seed: 1
      k: 15
      mode: topk

data_loader_arguments:
  num_workers: 0
