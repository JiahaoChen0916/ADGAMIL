exp_arguments:
  n_classes: 2
  save_exp_code: TCGA_BRCA_CHIEF_100
  raw_save_dir: D:/ADGA-main/heatmaps/heatmap_raw_results_BRCA_CHIEF_v2
  production_save_dir: D:/ADGA-main/heatmaps/heatmap_production_results_BRCA_CHIEF_v2
  batch_size: 256

data_arguments:
  data_dir: D:/ADGA_Datasets/heatmap_slides/BRCA/IDC/Slides
  data_dir_key: source
  process_list: D:/ADGA-main/dataset_csv/tcga_brca_heatmap_IDC.csv
  preset: null
  slide_ext: .svs
  label_dict:
    IDC: 1
    ILC: 0

patching_arguments:
  patch_size: 256
  overlap: 0.25
  patch_level: 0
  custom_downsample: 1

encoder_arguments:
  model_name: chief
  target_img_size: 224

model_arguments:
  ckpt_path: D:/ADGA-main/results/TCGA_BRCA_CHIEF_100_s1/s_3_best_checkpoint.pt
  model_type: clam_sb
  initiate_fn: initiate_model
  model_size: small
  drop_out: 0.25
  embed_dim: 768

heatmap_arguments:
  vis_level: 2
  alpha: 0.65
  blank_canvas: false
  save_orig: True
  save_ext: jpg
  use_ref_scores: false
  blur: true
  use_center_shift: true
  use_roi: false
  calc_heatmap: True
  binarize: false
  binary_thresh: -1
  custom_downsample: 1
  cmap: jet
  convert_to_percentiles: true
  enable_fine_heatmap: True
  

sample_arguments:
  samples:
    - name: topk_high_attention_brca_chief
      sample: true
      seed: 1
      k: 15
      mode: topk

data_loader_arguments:
  num_workers: 0
